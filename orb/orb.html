<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Dalia</title>
<style>
  html, body { margin: 0; padding: 0; background: transparent; overflow: hidden;
               font-family: -apple-system, "SF Mono", Menlo, monospace; }
  #orbwrap { width: 300px; height: 300px; position: relative; }
  canvas { display: block; -webkit-user-select: none; cursor: grab; }
  #bar { position: absolute; top: 6px; right: 10px; z-index: 10;
         opacity: 0; transition: opacity .25s; display: flex; gap: 8px; }
  #orbwrap:hover #bar { opacity: 1; }
  #bar button { background: rgba(20,20,25,.65); color: #ffd9a0; border: none;
                border-radius: 8px; width: 30px; height: 30px; font-size: 15px;
                cursor: pointer; }
  #bar button:hover { background: rgba(60,50,40,.85); }
  #cockpit { display: none; margin: 0 8px; padding: 12px 14px;
             background: rgba(15,15,20,.82); border-radius: 14px;
             color: #e8e0d0; font-size: 12px; line-height: 1.75; }
  #cockpit .t { color: #ffb347; font-weight: 600; letter-spacing: .4px; }
  #cockpit .ok { color: #7fd58a; }  #cockpit .ko { color: #ff7a6e; }
  #cockpit .dim { color: #9a948a; }
  #cockpit table { width: 100%; border-collapse: collapse; }
  #cockpit td { padding: 0; vertical-align: top; }
  #cockpit td:first-child { width: 86px; }
</style>
</head>
<body>
<div id="orbwrap">
  <div id="bar">
    <button id="btn-expand" title="cockpit">⤢</button>
    <button id="btn-quit" title="quitter Dalia">✕</button>
  </div>
</div>
<div id="cockpit">
  <table>
    <tr><td class="t">Mac</td><td id="s-mac" class="dim">…</td></tr>
    <tr><td class="t">LLM</td><td id="s-llm" class="dim">…</td></tr>
  </table>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
<script>
"use strict";

// ── Paramètres par état ──────────────────────────────────────────────────
// amp: amplitude du bruit | freq: fréquence spatiale | speed: vitesse du bruit
// rot: vitesse de rotation | color/rim: palette | breath: respiration (scale)
const STATES = {
  idle:      { amp: 0.07, freq: 1.6, speed: 0.30, rot: 0.10, breath: 0.035,
               color: [1.00, 0.72, 0.35], rim: [1.00, 0.85, 0.55] },   // ambre doux
  listening: { amp: 0.06, freq: 2.2, speed: 0.80, rot: 0.18, breath: 0.0,
               color: [0.25, 0.55, 1.00], rim: [0.55, 0.80, 1.00] },   // bleu froid
  thinking:  { amp: 0.26, freq: 3.0, speed: 2.60, rot: 1.40, breath: 0.0,
               color: [0.62, 0.36, 1.00], rim: [0.85, 0.65, 1.00] },   // violet
  speaking:  { amp: 0.08, freq: 2.0, speed: 1.00, rot: 0.25, breath: 0.0,
               color: [1.00, 0.62, 0.10], rim: [1.00, 0.80, 0.30] },   // ambre vif
};

let current = "idle";
let level = 0;           // amplitude micro/TTS temps réel [0,1]
let levelSmooth = 0;

// Appelée depuis Python via webview.evaluate_js("setState('thinking', 0)")
function setState(state, lv) {
  if (state in STATES) current = state;
  if (typeof lv === "number" && isFinite(lv)) level = Math.max(0, Math.min(1, lv));
}
window.setState = setState;

// ── Scène ────────────────────────────────────────────────────────────────
const orbwrap = document.getElementById("orbwrap");
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(300, 300);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);
orbwrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 10);
camera.position.z = 3.2;

// Icosphère détail 64 → 20*(64+1)² ≈ 84 500 triangles (< 100 K), un seul mesh.
const geometry = new THREE.IcosahedronGeometry(1, 64);

const uniforms = {
  uTime:  { value: 0 },
  uAmp:   { value: STATES.idle.amp },
  uFreq:  { value: STATES.idle.freq },
  uSpeed: { value: STATES.idle.speed },
  uColor: { value: new THREE.Vector3(...STATES.idle.color) },
  uRim:   { value: new THREE.Vector3(...STATES.idle.rim) },
};

const vertexShader = /* glsl */`
// Simplex 3D noise — Ashima Arts (MIT), version condensée
vec4 permute(vec4 x){ return mod(((x*34.0)+1.0)*x, 289.0); }
vec4 taylorInvSqrt(vec4 r){ return 1.79284291400159 - 0.85373472095314 * r; }
float snoise(vec3 v){
  const vec2 C = vec2(1.0/6.0, 1.0/3.0);
  const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
  vec3 i  = floor(v + dot(v, C.yyy));
  vec3 x0 = v - i + dot(i, C.xxx);
  vec3 g = step(x0.yzx, x0.xyz);
  vec3 l = 1.0 - g;
  vec3 i1 = min(g.xyz, l.zxy);
  vec3 i2 = max(g.xyz, l.zxy);
  vec3 x1 = x0 - i1 + 1.0 * C.xxx;
  vec3 x2 = x0 - i2 + 2.0 * C.xxx;
  vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;
  i = mod(i, 289.0);
  vec4 p = permute(permute(permute(
            i.z + vec4(0.0, i1.z, i2.z, 1.0))
          + i.y + vec4(0.0, i1.y, i2.y, 1.0))
          + i.x + vec4(0.0, i1.x, i2.x, 1.0));
  float n_ = 1.0/7.0;
  vec3 ns = n_ * D.wyz - D.xzx;
  vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
  vec4 x_ = floor(j * ns.z);
  vec4 y_ = floor(j - 7.0 * x_);
  vec4 x = x_ * ns.x + ns.yyyy;
  vec4 y = y_ * ns.x + ns.yyyy;
  vec4 h = 1.0 - abs(x) - abs(y);
  vec4 b0 = vec4(x.xy, y.xy);
  vec4 b1 = vec4(x.zw, y.zw);
  vec4 s0 = floor(b0) * 2.0 + 1.0;
  vec4 s1 = floor(b1) * 2.0 + 1.0;
  vec4 sh = -step(h, vec4(0.0));
  vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
  vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
  vec3 p0 = vec3(a0.xy, h.x);
  vec3 p1 = vec3(a0.zw, h.y);
  vec3 p2 = vec3(a1.xy, h.z);
  vec3 p3 = vec3(a1.zw, h.w);
  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
  p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
  vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
  m = m * m;
  return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
}

uniform float uTime;
uniform float uAmp;
uniform float uFreq;
uniform float uSpeed;
varying float vNoise;
varying vec3 vNormalW;
varying vec3 vPosW;

void main() {
  float n = snoise(normal * uFreq + vec3(uTime * uSpeed));
  vNoise = n;
  vec3 displaced = position + normal * n * uAmp;
  vec4 world = modelMatrix * vec4(displaced, 1.0);
  vPosW = world.xyz;
  vNormalW = normalize(mat3(modelMatrix) * normal);
  gl_Position = projectionMatrix * viewMatrix * world;
}
`;

const fragmentShader = /* glsl */`
uniform vec3 uColor;
uniform vec3 uRim;
varying float vNoise;
varying vec3 vNormalW;
varying vec3 vPosW;

void main() {
  vec3 viewDir = normalize(cameraPosition - vPosW);
  float fresnel = pow(1.0 - max(dot(viewDir, normalize(vNormalW)), 0.0), 2.4);
  vec3 base = uColor * (0.55 + 0.45 * (vNoise * 0.5 + 0.5));
  vec3 color = base + uRim * fresnel * 1.5;
  float alpha = 0.92 + fresnel * 0.08;
  gl_FragColor = vec4(color, alpha);
}
`;

const material = new THREE.ShaderMaterial({
  uniforms, vertexShader, fragmentShader, transparent: true,
});
const orb = new THREE.Mesh(geometry, material);
scene.add(orb);

camera.aspect = 1;
camera.updateProjectionMatrix();

// ── Cockpit ──────────────────────────────────────────────────────────────
document.getElementById("btn-expand").onclick = () =>
  window.pywebview && pywebview.api.toggle_cockpit();
document.getElementById("btn-quit").onclick = () =>
  window.pywebview && pywebview.api.quit();

function showCockpit(open) {
  document.getElementById("cockpit").style.display = open ? "block" : "none";
  document.getElementById("btn-expand").textContent = open ? "⤡" : "⤢";
}
window.showCockpit = showCockpit;

// Appelée depuis Python avec un objet {mac, llm} ;
// chaque entrée = {txt, ok|null}.
function updateStats(s) {
  for (const [id, v] of Object.entries(s)) {
    const el = document.getElementById("s-" + id);
    if (!el || !v) continue;
    el.textContent = v.txt;
    el.className = v.ok === true ? "ok" : v.ok === false ? "ko" : "dim";
  }
}
window.updateStats = updateStats;

// ── Boucle : interpolation douce vers l'état courant ────────────────────
const lerp = (a, b, t) => a + (b - a) * t;
const cur = { amp: STATES.idle.amp, freq: STATES.idle.freq, speed: STATES.idle.speed,
              rot: STATES.idle.rot, r: STATES.idle.color[0], g: STATES.idle.color[1], b: STATES.idle.color[2],
              rr: STATES.idle.rim[0], rg: STATES.idle.rim[1], rb: STATES.idle.rim[2] };
let last = performance.now();

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;
  const t = uniforms.uTime.value += dt;
  const s = STATES[current];
  const k = 1 - Math.exp(-6 * dt);   // lissage indépendant du framerate

  levelSmooth = lerp(levelSmooth, level, 1 - Math.exp(-10 * dt));
  // listening : l'amplitude suit le niveau micro temps réel.
  // speaking : niveau TTS si fourni, sinon pulsation simulée (v1).
  let targetAmp = s.amp;
  if (current === "listening") {
    targetAmp = s.amp + levelSmooth * 0.45;
  } else if (current === "speaking") {
    const pulse = 0.18 + 0.14 * Math.sin(t * 7.3) * Math.sin(t * 2.1);
    targetAmp = s.amp + Math.max(levelSmooth, pulse) * 0.45;
  }

  cur.amp = lerp(cur.amp, targetAmp, k);
  cur.freq = lerp(cur.freq, s.freq, k);
  cur.speed = lerp(cur.speed, s.speed, k);
  cur.rot = lerp(cur.rot, s.rot, k);
  cur.r = lerp(cur.r, s.color[0], k); cur.g = lerp(cur.g, s.color[1], k); cur.b = lerp(cur.b, s.color[2], k);
  cur.rr = lerp(cur.rr, s.rim[0], k); cur.rg = lerp(cur.rg, s.rim[1], k); cur.rb = lerp(cur.rb, s.rim[2], k);

  uniforms.uAmp.value = cur.amp;
  uniforms.uFreq.value = cur.freq;
  uniforms.uSpeed.value = cur.speed;
  uniforms.uColor.value.set(cur.r, cur.g, cur.b);
  uniforms.uRim.value.set(cur.rr, cur.rg, cur.rb);

  orb.rotation.y += cur.rot * dt;
  orb.rotation.x += cur.rot * 0.35 * dt;

  // respiration lente en idle
  const breath = current === "idle" ? 1 + Math.sin(t * 1.1) * STATES.idle.breath : 1;
  orb.scale.setScalar(breath);

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

// ── Déplacement de la fenêtre (pywebview easy_drag est géré côté Python) ─
</script>
</body>
</html>
